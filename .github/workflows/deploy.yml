name: CI / Deploy

on:
  push:
    branches:
      - main
      - production
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
    - name: Build
      run: go build ./...
    - name: Run integration tests
      run: go test -count=1 -timeout 180s ./tests/integration/...

  deploy:
    needs: test
    # Only the production branch deploys to Fly. Pushes to main run tests
    # but skip deploy. This keeps main as a "ready to ship" line and gives
    # production an explicit gate before traffic moves.
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Fly.io CLI
      uses: superfly/flyctl-actions/setup-flyctl@v1
    - name: Deploy to Fly.io
      run: flyctl deploy --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
