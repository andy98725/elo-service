basePath: /
definitions:
  echo.HTTPError:
    properties:
      code:
        type: integer
      internal:
        description: Stores the error returned by an external dependency
      message: {}
    type: object
  github_com_andy98725_elo-service_src_models.GameResp:
    properties:
      description:
        type: string
      elo_strategy:
        type: string
      guests_allowed:
        type: boolean
      id:
        type: string
      lobby_enabled:
        type: boolean
      lobby_size:
        type: integer
      matchmaking_machine_name:
        type: string
      matchmaking_machine_ports:
        items:
          type: integer
        type: array
      matchmaking_strategy:
        type: string
      metadata_enabled:
        type: boolean
      name:
        type: string
      owner:
        $ref: '#/definitions/github_com_andy98725_elo-service_src_models.UserResp'
    type: object
  github_com_andy98725_elo-service_src_models.MatchResp:
    properties:
      game_id:
        type: string
      guest_ids:
        items:
          type: string
        type: array
      id:
        type: string
      players:
        items:
          $ref: '#/definitions/github_com_andy98725_elo-service_src_models.UserResp'
        type: array
      server_address:
        type: string
      status:
        type: string
    type: object
  github_com_andy98725_elo-service_src_models.MatchResultResp:
    properties:
      game_id:
        type: string
      guest_ids:
        items:
          type: string
        type: array
      id:
        type: string
      players:
        items:
          $ref: '#/definitions/github_com_andy98725_elo-service_src_models.UserResp'
        type: array
      result:
        type: string
      winner_ids:
        items:
          type: string
        type: array
    type: object
  github_com_andy98725_elo-service_src_models.UpdateGameParams:
    properties:
      description:
        type: string
      elo_strategy:
        type: string
      guests_allowed:
        type: boolean
      lobby_enabled:
        type: boolean
      lobby_size:
        type: integer
      matchmaking_machine_name:
        type: string
      matchmaking_machine_ports:
        items:
          type: integer
        type: array
      matchmaking_strategy:
        type: string
      metadata_enabled:
        type: boolean
      name:
        type: string
      public_match_logs:
        type: boolean
      public_match_results:
        type: boolean
    type: object
  github_com_andy98725_elo-service_src_models.UserResp:
    properties:
      email:
        type: string
      id:
        type: string
      is_admin:
        type: boolean
      username:
        type: string
    type: object
  src_api_game.CreateGameRequest:
    properties:
      description:
        type: string
      elo_strategy:
        type: string
      guests_allowed:
        type: boolean
      lobby_enabled:
        type: boolean
      lobby_size:
        type: integer
      matchmaking_machine_name:
        type: string
      matchmaking_machine_ports:
        items:
          type: integer
        type: array
      matchmaking_strategy:
        type: string
      metadata_enabled:
        type: boolean
      name:
        type: string
    type: object
  src_api_matchResults.ReportResultsRequest:
    properties:
      reason:
        type: string
      token_id:
        type: string
      winner_id:
        type: string
      winner_ids:
        items:
          type: string
        type: array
    type: object
  src_api_user.GuestRequest:
    properties:
      displayName:
        type: string
    type: object
  src_api_user.LoginRequest:
    properties:
      displayName:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  src_api_user.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for matchmaking, game management, user management, and ELO rating.
  title: Elo Matchmaking Service API
  version: "1.0"
paths:
  /game:
    post:
      consumes:
      - application/json
      description: Creates a new game with matchmaking and ELO configuration
      parameters:
      - description: Game creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/src_api_game.CreateGameRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.GameResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "409":
          description: game name already taken
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Create a game
      tags:
      - Games
  /game/{gameID}/results:
    get:
      description: Returns a paginated list of match results for a specific game
      parameters:
      - description: Game UUID
        in: path
        name: gameID
        required: true
        type: string
      - description: Page number (default 0)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: matchResults, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get match results for a game
      tags:
      - Results
  /game/{id}:
    delete:
      description: Deletes a game. Only the game owner can delete.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: caller is not the game owner
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Delete a game
      tags:
      - Games
    get:
      description: Returns a single game by its UUID
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.GameResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get a game by ID
      tags:
      - Games
    put:
      consumes:
      - application/json
      description: Updates game settings. Only the game owner can update.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_andy98725_elo-service_src_models.UpdateGameParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.GameResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: caller is not the game owner
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Update a game
      tags:
      - Games
  /games:
    get:
      description: Returns a paginated list of all games. Admin only.
      parameters:
      - description: Page number (default 0)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: games, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: List all games (admin)
      tags:
      - Games
  /guest/login:
    post:
      consumes:
      - application/json
      description: Returns a JWT token for a guest user with the given display name
      parameters:
      - description: Guest login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/src_api_user.GuestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token, displayName, id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Create a guest session
      tags:
      - Auth
  /health:
    get:
      description: Returns a simple health status
      produces:
      - application/json
      responses:
        "200":
          description: status
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /lobby/find:
    get:
      description: Returns lobbies for the given game, optionally filtered to those
        whose Tags contain ALL the comma-separated tags in the query.
      parameters:
      - description: Game UUID
        in: query
        name: gameID
        required: true
        type: string
      - description: Comma-separated tags; lobby must include every tag to be returned
        in: query
        name: tags
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: lobbies
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: List open lobbies for a game
      tags:
      - Lobby
  /lobby/host:
    get:
      description: Upgrades to a WebSocket. Creates a new lobby for a game and keeps
        the host's connection open. The host owns chat, /disconnect <name>, and /start
        commands. Lobby is torn down when the host disconnects.
      parameters:
      - description: Game UUID
        in: query
        name: gameID
        required: true
        type: string
      - description: Comma-separated tags advertised to /lobby/find (max 16)
        in: query
        name: tags
        type: string
      - description: Opaque metadata stored on the lobby record
        in: query
        name: metadata
        type: string
      - description: JWT token (alternative to Authorization header)
        in: query
        name: token
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: Host a lobby (WebSocket)
      tags:
      - Lobby
  /lobby/join:
    get:
      description: Upgrades to a WebSocket and joins an existing lobby. Capacity is
        enforced atomically; rejects with 'lobby is full' once the lobby's player
        count equals MaxPlayers. Receives lobby events (player_join, player_leave,
        player_say, lobby_starting) and the post-/start matchmaking handshake.
      parameters:
      - description: Lobby UUID returned by /lobby/host or /lobby/find
        in: query
        name: lobbyID
        required: true
        type: string
      - description: JWT token (alternative to Authorization header)
        in: query
        name: token
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: Join a lobby (WebSocket)
      tags:
      - Lobby
  /match/{matchID}:
    get:
      description: Returns match details. User must be a participant or game owner.
      parameters:
      - description: Match UUID
        in: path
        name: matchID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.MatchResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get a match by ID
      tags:
      - Matches
  /match/game/{gameID}:
    get:
      description: Returns a paginated list of matches for a specific game
      parameters:
      - description: Game UUID
        in: path
        name: gameID
        required: true
        type: string
      - description: Page number (default 0)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: matches, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get matches for a game
      tags:
      - Matches
  /match/join:
    get:
      description: Upgrades to a WebSocket connection and joins the matchmaking queue
        for a game. Sends status updates until a match is found.
      parameters:
      - description: Game UUID to queue for
        in: query
        name: gameID
        required: true
        type: string
      - description: Optional sub-queue key (only honored when game.metadata_enabled=true;
          capped at 4 KB)
        in: query
        name: metadata
        type: string
      - description: JWT token (alternative to Authorization header)
        in: query
        name: token
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: Join matchmaking queue (WebSocket)
      tags:
      - Matchmaking
  /match/size:
    get:
      description: Returns the number of players currently in the matchmaking queue
        for a game
      parameters:
      - description: Game UUID
        in: query
        name: gameID
        required: true
        type: string
      - description: Sub-queue key (only honored when game.metadata_enabled=true)
        in: query
        name: metadata
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: players_in_queue
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get matchmaking queue size
      tags:
      - Matchmaking
  /matches:
    get:
      description: Returns a paginated list of all matches. Admin only.
      parameters:
      - description: Page number (default 0)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: matches, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: List all matches (admin)
      tags:
      - Matches
  /result/report:
    post:
      consumes:
      - application/json
      description: Called by the game server to report the outcome of a match
      parameters:
      - description: Match result payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/src_api_matchResults.ReportResultsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Report match results
      tags:
      - Results
  /results:
    get:
      description: Returns a paginated list of all match results. Admin only.
      parameters:
      - description: Page number (default 0)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: matchResults, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: List all match results (admin)
      tags:
      - Results
  /results/{matchID}:
    get:
      description: Returns the result of a completed match
      parameters:
      - description: Match result UUID
        in: path
        name: matchID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.MatchResultResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get a match result
      tags:
      - Results
  /results/{matchID}/logs:
    get:
      description: Returns the logs for a completed match. Access depends on game
        settings and user role.
      parameters:
      - description: Match result UUID
        in: path
        name: matchID
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Match logs
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get match logs
      tags:
      - Results
  /user:
    delete:
      description: Deletes the authenticated user's account (not yet implemented)
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Delete current user
      tags:
      - Users
    get:
      description: Returns the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.UserResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Creates a user with the provided username, email, and password
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/src_api_user.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_andy98725_elo-service_src_models.UserResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "409":
          description: username or email already taken
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Register a new user
      tags:
      - Users
    put:
      description: Updates the authenticated user's profile (not yet implemented)
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Update current user
      tags:
      - Users
  /user/{userID}/results:
    get:
      description: Returns a paginated list of match results for a specific user.
        Admin only.
      parameters:
      - description: User UUID
        in: path
        name: userID
        required: true
        type: string
      - description: Page number (default 0)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: matchResults, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get match results for a user (admin)
      tags:
      - Results
  /user/game:
    get:
      description: Returns a paginated list of games owned by the authenticated user
      parameters:
      - description: Page number
        in: query
        name: page
        required: true
        type: integer
      - description: Page size
        in: query
        name: pageSize
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: games, nextPage
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      security:
      - BearerAuth: []
      summary: Get games owned by current user
      tags:
      - Games
  /user/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, returns a JWT token
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/src_api_user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token, displayName, id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Log in a user
      tags:
      - Auth
  /user/rating/{gameId}:
    get:
      description: Returns the current user's ELO rating for a specific game (not
        yet implemented)
      parameters:
      - description: Game UUID
        in: path
        name: gameId
        required: true
        type: string
      produces:
      - application/json
      responses:
